<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitCal — Полный трекер питания</title>
    <style>
        /* ===== ГЛОБАЛЬНЫЕ СТИЛИ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ===== ЗАГОЛОВОК ===== */
        h1 {
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #00d4ff, #7b2ffc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 20px;
            font-size: 1rem;
        }

        /* ===== НАВИГАЦИЯ (ВКЛАДКИ) ===== */
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .tab-btn {
            padding: 10px 20px;
            border-radius: 30px;
            border: 2px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.03);
            color: #888;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 0.9rem;
            backdrop-filter: blur(5px);
        }

        .tab-btn:hover {
            border-color: #00d4ff;
            color: #fff;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.15), rgba(123, 47, 252, 0.15));
            border-color: #7b2ffc;
            color: #fff;
            box-shadow: 0 0 25px rgba(123, 47, 252, 0.1);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== КАРТОЧКИ ===== */
        .card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #00d4ff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ===== ПОЛЗУНКИ ===== */
        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .input-group label {
            font-size: 0.85rem;
            color: #aaa;
            font-weight: 500;
        }

        .input-group input[type="range"] {
            width: 100%;
            height: 5px;
            -webkit-appearance: none;
            background: linear-gradient(90deg, #00d4ff, #7b2ffc);
            border-radius: 10px;
            outline: none;
            cursor: pointer;
        }

        .input-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #00d4ff;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .input-group .value-display {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
        }

        /* ===== КНОПКИ ===== */
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .btn-group .btn {
            padding: 8px 18px;
            border-radius: 30px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: transparent;
            color: #aaa;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 0.85rem;
        }

        .btn-group .btn:hover {
            border-color: #00d4ff;
            color: #fff;
        }

        .btn-group .btn.active {
            background: rgba(0, 212, 255, 0.15);
            border-color: #00d4ff;
            color: #fff;
        }

        /* ===== ГЛАВНАЯ КНОПКА ===== */
        .btn-primary {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #00d4ff, #7b2ffc);
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.2);
        }

        .btn-secondary {
            padding: 8px 16px;
            border-radius: 30px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(255,255,255,0.05);
            color: #ccc;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .btn-secondary:hover {
            border-color: #00d4ff;
            color: #fff;
        }

        /* ===== РЕЗУЛЬТАТЫ ===== */
        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
        }

        .result-item {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 14px;
            padding: 14px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .result-item .number {
            font-size: 1.8rem;
            font-weight: 800;
            color: #00d4ff;
            display: block;
        }

        .result-item .desc {
            font-size: 0.8rem;
            color: #888;
        }

        /* ===== БЖУ ===== */
        .bju-row {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin: 10px 0;
        }

        .bju-item {
            text-align: center;
        }

        .bju-item .bju-value {
            font-size: 1.4rem;
            font-weight: 700;
        }
        .bju-item.protein .bju-value { color: #ff6b6b; }
        .bju-item.fat .bju-value { color: #ffd93d; }
        .bju-item.carbs .bju-value { color: #6bcb77; }

        .bju-item .bju-label {
            font-size: 0.75rem;
            color: #888;
        }

        /* ===== ВОДА ===== */
        .water-tracker {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .water-glasses {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .glass {
            width: 40px;
            height: 50px;
            border: 2px solid #00d4ff;
            border-radius: 6px 6px 12px 12px;
            background: rgba(0, 212, 255, 0.05);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            color: #555;
        }

        .glass.filled {
            background: rgba(0, 212, 255, 0.3);
            border-color: #00d4ff;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.15);
            color: #00d4ff;
        }

        .glass:hover {
            transform: scale(1.05);
        }

        .water-progress {
            flex: 1;
            min-width: 150px;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: rgba(255,255,255,0.08);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 5px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #7b2ffc);
            border-radius: 10px;
            transition: width 0.5s ease;
            width: 0%;
        }

        /* ===== СПИСОК ПОКУПОК ===== */
        .shopping-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
        }

        .shopping-category {
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 12px 16px;
            border: 1px solid rgba(255,255,255,0.04);
        }

        .shopping-category .cat-title {
            font-weight: 600;
            color: #00d4ff;
            font-size: 0.9rem;
            margin-bottom: 6px;
        }

        .shopping-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            padding: 3px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .shopping-item input[type="checkbox"] {
            accent-color: #00d4ff;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .shopping-item.checked {
            text-decoration: line-through;
            color: #555;
        }

        /* ===== ТРЕКЕР ПИТАНИЯ ===== */
        .food-log {
            max-height: 300px;
            overflow-y: auto;
        }

        .food-log .log-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: rgba(0,0,0,0.15);
            border-radius: 10px;
            margin-bottom: 6px;
            border: 1px solid rgba(255,255,255,0.04);
        }

        .food-log .log-item .log-name {
            font-weight: 500;
        }

        .food-log .log-item .log-cal {
            color: #888;
            font-size: 0.85rem;
        }

        .food-log .log-item .log-del {
            color: #ff6b6b;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 1.1rem;
        }

        /* ===== СТАТИСТИКА ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 15px;
        }

        .stats-card {
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 14px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.04);
        }

        .stats-card .stat-number {
            font-size: 1.6rem;
            font-weight: 700;
            color: #00d4ff;
        }

        .stats-card .stat-label {
            font-size: 0.75rem;
            color: #888;
        }

        .weight-history {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .weight-entry {
            display: flex;
            justify-content: space-between;
            padding: 6px 12px;
            background: rgba(0,0,0,0.15);
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .weight-entry .date {
            color: #888;
        }

        .weight-entry .weight {
            font-weight: 600;
            color: #fff;
        }

        /* ===== РЕЦЕПТЫ (с фильтрами) ===== */
        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }

        .filter-btn {
            padding: 5px 14px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.08);
            background: transparent;
            color: #888;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .filter-btn:hover {
            border-color: #00d4ff;
            color: #fff;
        }

        .filter-btn.active {
            background: rgba(0, 212, 255, 0.15);
            border-color: #00d4ff;
            color: #fff;
        }

        .recipe-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
            max-height: 600px;
            overflow-y: auto;
        }

        .recipe-card {
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 12px 16px;
            border: 1px solid rgba(255,255,255,0.04);
            transition: all 0.3s ease;
        }

        .recipe-card:hover {
            border-color: rgba(123, 47, 252, 0.2);
            transform: translateY(-2px);
        }

        .recipe-card .recipe-name {
            font-weight: 600;
            color: #fff;
            font-size: 0.95rem;
        }

        .recipe-card .recipe-info {
            font-size: 0.75rem;
            color: #888;
        }

        .recipe-card .recipe-cal {
            color: #00d4ff;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .recipe-card .recipe-tags {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-top: 4px;
        }

        .recipe-card .recipe-tags .tag {
            font-size: 0.6rem;
            padding: 2px 10px;
            border-radius: 12px;
            background: rgba(255,255,255,0.06);
            color: #888;
        }

        /* ===== ОБЩЕЕ ===== */
        .hidden { display: none !important; }
        .mt-10 { margin-top: 10px; }
        .mb-10 { margin-bottom: 10px; }
        .flex-center { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

        @media (max-width: 600px) {
            h1 { font-size: 1.6rem; }
            .card { padding: 14px; }
            .tab-btn { padding: 6px 14px; font-size: 0.75rem; }
            .result-grid { grid-template-columns: 1fr 1fr; }
            .input-grid { grid-template-columns: 1fr; }
            .water-tracker { flex-direction: column; }
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #1a1a2e; }
        ::-webkit-scrollbar-thumb { background: #7b2ffc; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">

    <h1>⚡ FitCal</h1>
    <p class="subtitle">Калькулятор + трекер питания + статистика</p>

    <!-- ===== ВКЛАДКИ ===== -->
    <div class="tabs">
        <button class="tab-btn active" data-tab="tabCalc">📊 Калькулятор</button>
        <button class="tab-btn" data-tab="tabWeek">📅 План недели</button>
        <button class="tab-btn" data-tab="tabWater">💧 Вода</button>
        <button class="tab-btn" data-tab="tabTracker">📝 Дневник</button>
        <button class="tab-btn" data-tab="tabStats">📈 Статистика</button>
        <button class="tab-btn" data-tab="tabRecipes">🍳 Рецепты</button>
    </div>

    <!-- ============================================================ -->
    <!-- ВКЛАДКА 1: КАЛЬКУЛЯТОР -->
    <!-- ============================================================ -->
    <div id="tabCalc" class="tab-content active">

        <div class="card">
            <div class="card-title">📊 Ваши параметры</div>
            <div class="input-grid">
                <div class="input-group">
                    <label>Пол</label>
                    <div style="display:flex;gap:8px;margin-top:4px;">
                        <button class="btn active" id="genderMale">Мужской</button>
                        <button class="btn" id="genderFemale">Женский</button>
                    </div>
                </div>
                <div class="input-group">
                    <label>Возраст: <span id="ageValue" class="value-display">31</span> лет</label>
                    <input type="range" id="ageRange" min="10" max="80" value="31">
                </div>
                <div class="input-group">
                    <label>Рост: <span id="heightValue" class="value-display">180</span> см</label>
                    <input type="range" id="heightRange" min="100" max="250" value="180">
                </div>
                <div class="input-group">
                    <label>Вес: <span id="weightValue" class="value-display">87</span> кг</label>
                    <input type="range" id="weightRange" min="30" max="200" value="87">
                </div>
            </div>
            <div style="margin-top:14px;">
                <label style="color:#aaa;font-size:0.85rem;">Уровень активности</label>
                <div class="btn-group" id="activityGroup">
                    <button class="btn" data-activity="1.2">Сидячий</button>
                    <button class="btn active" data-activity="1.375">Средний</button>
                    <button class="btn" data-activity="1.55">Активный</button>
                    <button class="btn" data-activity="1.725">Очень активный</button>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">🎯 Цель</div>
            <div class="btn-group" id="deficitGroup">
                <button class="btn" data-deficit="0.9">🟢 Мягкий (-10%)</button>
                <button class="btn active" data-deficit="0.85">🔵 Стандартный (-15%)</button>
                <button class="btn" data-deficit="0.8">🔴 Быстрый (-20%)</button>
            </div>
        </div>

        <button class="btn-primary" id="calculateBtn">🔥 Рассчитать и обновить план</button>

        <div id="calcResults" class="hidden">
            <div class="card">
                <div class="card-title">📈 Ваша норма</div>
                <div class="result-grid" id="resultNumbers"></div>
                <div class="bju-row" id="bjuDisplay"></div>
            </div>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- ВКЛАДКА 2: ПЛАН НЕДЕЛИ -->
    <!-- ============================================================ -->
    <div id="tabWeek" class="tab-content">
        <div class="card">
            <div class="card-title">📅 План питания на неделю</div>
            <div id="weekPlanContainer"></div>
        </div>
        <div class="card">
            <div class="card-title">🛒 Список покупок</div>
            <div id="shoppingList"></div>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- ВКЛАДКА 3: ВОДА -->
    <!-- ============================================================ -->
    <div id="tabWater" class="tab-content">
        <div class="card">
            <div class="card-title">💧 Водный баланс</div>
            <div id="waterDisplay">
                <div class="water-tracker">
                    <div>
                        <div style="font-size:1.8rem;font-weight:700;color:#00d4ff;" id="waterGoalDisplay">2.6 Л</div>
                        <div style="color:#888;font-size:0.8rem;">Норма на день</div>
                    </div>
                    <div class="water-progress">
                        <div style="display:flex;justify-content:space-between;">
                            <span id="waterDrank">0</span>
                            <span id="waterPercent">0%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="waterFill" style="width:0%;"></div>
                        </div>
                    </div>
                </div>
                <div class="water-glasses" id="waterGlasses"></div>
                <div style="margin-top:10px;">
                    <button class="btn-secondary" id="resetWaterBtn">🔄 Сбросить воду</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- ВКЛАДКА 4: ДНЕВНИК ПИТАНИЯ -->
    <!-- ============================================================ -->
    <div id="tabTracker" class="tab-content">
        <div class="card">
            <div class="card-title">📝 Дневник питания (сегодня)</div>
            <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;">
                <select id="foodSelect" style="flex:1;padding:10px;border-radius:10px;background:rgba(255,255,255,0.05);color:#fff;border:1px solid rgba(255,255,255,0.1);">
                    <option value="">-- Выберите рецепт --</option>
                </select>
                <button class="btn-secondary" id="addFoodBtn">➕ Добавить</button>
            </div>
            <div style="display:flex;gap:15px;flex-wrap:wrap;margin-bottom:10px;">
                <span>🔥 <span id="todayCal">0</span> ккал</span>
                <span style="color:#ff6b6b;">🥩 <span id="todayProtein">0</span>г</span>
                <span style="color:#ffd93d;">🥑 <span id="todayFat">0</span>г</span>
                <span style="color:#6bcb77;">🍞 <span id="todayCarbs">0</span>г</span>
            </div>
            <div class="food-log" id="foodLog"></div>
            <button class="btn-secondary" id="resetFoodBtn" style="margin-top:10px;">🗑 Очистить дневник</button>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- ВКЛАДКА 5: СТАТИСТИКА -->
    <!-- ============================================================ -->
    <div id="tabStats" class="tab-content">
        <div class="card">
            <div class="card-title">📈 Статистика</div>
            <div class="stats-grid" id="statsOverview"></div>
            <div style="margin-top:15px;">
                <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;">
                    <input type="number" id="newWeightInput" placeholder="Новый вес (кг)" style="padding:10px;border-radius:10px;background:rgba(255,255,255,0.05);color:#fff;border:1px solid rgba(255,255,255,0.1);flex:1;">
                    <button class="btn-secondary" id="addWeightBtn">📌 Записать вес</button>
                </div>
                <div class="weight-history" id="weightHistory"></div>
            </div>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- ВКЛАДКА 6: РЕЦЕПТЫ -->
    <!-- ============================================================ -->
    <div id="tabRecipes" class="tab-content">
        <div class="card">
            <div class="card-title">🍳 Рецепты (30 шт)</div>
            <div class="filter-buttons" id="recipeFilters">
                <button class="filter-btn active" data-filter="all">Все</button>
                <button class="filter-btn" data-filter="Мясные">🥩 Мясные</button>
                <button class="filter-btn" data-filter="Рыбные">🐟 Рыбные</button>
                <button class="filter-btn" data-filter="Яичные">🥚 Яичные</button>
                <button class="filter-btn" data-filter="Каши">🌾 Каши</button>
                <button class="filter-btn" data-filter="Овощные">🥗 Овощные</button>
                <button class="filter-btn" data-filter="Веганские">🌱 Веганские</button>
            </div>
            <div class="recipe-grid" id="recipeGrid"></div>
        </div>
    </div>

</div>

<script>
    // ================================================================
    // 1. ДАННЫЕ
    // ================================================================

    // --- 30 РЕЦЕПТОВ с КАТЕГОРИЯМИ и ЦЕНАМИ ---

    function loadState(key, defaultVal) {
        try {
            const data = localStorage.getItem('fitcal_' + key);
            return data ? JSON.parse(data) : defaultVal;
        } catch { return defaultVal; }
    }

    function saveState(key, val) {
        localStorage.setItem('fitcal_' + key, JSON.stringify(val));
    }

    // --- РАСЧЁТ КАЛОРИЙ ---
    function calculateCalories(gender, age, height, weight, activity, deficit) {
        let bmr;
        if (gender === 'male') bmr = 10 * weight + 6.25 * height - 5 * age + 5;
        else bmr = 10 * weight + 6.25 * height - 5 * age - 161;
        const tdee = bmr * activity;
        const dailyCal = Math.round(tdee * deficit);
        const protein = Math.round(weight * 1.8);
        const fat = Math.round(weight * 0.8);
        const carbs = Math.round((dailyCal - (protein * 4 + fat * 9)) / 4);
        return { bmr: Math.round(bmr), tdee: Math.round(tdee), dailyCal, protein, fat, carbs };
    }

    // --- ГЕНЕРАЦИЯ ПЛАНА НА НЕДЕЛЮ ---
    function generateWeekPlan() {
        const breakfasts = RECIPES.filter(r => r.type === 'Завтрак');
        const lunches = RECIPES.filter(r => r.type === 'Обед');
        const dinners = RECIPES.filter(r => r.type === 'Ужин');
        const snacks = RECIPES.filter(r => r.type === 'Перекус');

        function pick(arr, i) { return arr[i % arr.length]; }

        const days = ['Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота', 'Воскресенье'];
        const week = [];
        for (let i = 0; i < 7; i++) {
            const b = pick(breakfasts, i);
            const l = pick(lunches, i + 2);
            const d = pick(dinners, i + 4);
            const s1 = pick(snacks, i);
            const s2 = pick(snacks, i + 3);
            const meals = [
                { type: 'Завтрак', name: b.name, cal: b.cal },
                { type: 'Обед', name: l.name, cal: l.cal },
                { type: 'Ужин', name: d.name, cal: d.cal },
                { type: 'Перекус 1', name: s1.name, cal: s1.cal },
                { type: 'Перекус 2', name: s2.name, cal: s2.cal }
            ];
            week.push({
                day: days[i],
                meals: meals,
                totalCal: meals.reduce((sum, m) => sum + m.cal, 0)
            });
        }
        return week;
    }

    // --- СОЗДАНИЕ СПИСКА ПОКУПОК ---
    function generateShoppingList(week) {
        const map = {};
        const categoryMap = {
            'Мясные': '🥩 Мясо и птица',
            'Рыбные': '🐟 Рыба и морепродукты',
            'Яичные': '🥚 Яйца и молочка',
            'Каши': '🌾 Крупы и злаки',
            'Овощные': '🥗 Овощи и зелень',
            'Веганские': '🌱 Веганские продукты'
        };

        week.forEach(day => {
            day.meals.forEach(meal => {
                const recipe = RECIPES.find(r => r.name === meal.name);
                if (!recipe) return;
                const cat = categoryMap[recipe.category] || recipe.category;
                if (!map[cat]) map[cat] = new Set();
                // Из описания берём ингредиенты (упрощённо)
                const items = recipe.desc.split(',').map(s => s.trim());
                items.forEach(item => {
                    if (item.length > 2) map[cat].add(item);
                });
            });
        });

        // Превращаем Set в массивы
        const result = {};
        for (const cat in map) {
            result[cat] = Array.from(map[cat]);
        }
        return result;
    }

    // --- НЕДЕЛЯ И СПИСОК ПОКУПОК ---
    function renderWeek() {
        if (!weekPlan) {
            weekPlan = generateWeekPlan();
            saveState('weekPlan', weekPlan);
        }

        // План
        const container = document.getElementById('weekPlanContainer');
        container.innerHTML = '<div class="week-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;"></div>';
        const grid = container.querySelector('.week-grid');
        weekPlan.forEach(day => {
            const card = document.createElement('div');
            card.className = 'day-card';
            card.style.cssText = 'background:rgba(0,0,0,0.2);border-radius:12px;padding:14px;border:1px solid rgba(255,255,255,0.04);';
            let mealsHtml = '';
            day.meals.forEach(m => {
                mealsHtml += `<div style="font-size:0.85rem;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.03);">
                    <span style="color:#888;">${m.type}:</span> ${m.name} <span style="color:#888;float:right;">${m.cal} ккал</span>
                </div>`;
            });
            card.innerHTML = `
                <div style="font-weight:700;color:#00d4ff;font-size:1.05rem;margin-bottom:8px;">${day.day}</div>
                ${mealsHtml}
                <div style="margin-top:8px;color:#00d4ff;font-weight:700;text-align:right;">Итого: ${day.totalCal} ккал</div>
            `;
            grid.appendChild(card);
        });

        // Список покупок
        const shopping = generateShoppingList(weekPlan);
        const shopContainer = document.getElementById('shoppingList');
        let html = '<div class="shopping-grid">';
        for (const cat in shopping) {
            html += `<div class="shopping-category"><div class="cat-title">${cat}</div>`;
            shopping[cat].forEach(item => {
                const id = 'shop_' + item.replace(/\s/g, '_');
                html += `
                    <div class="shopping-item" id="${id}">
                        <input type="checkbox" onchange="toggleShopItem('${id}')">
                        <span>${item}</span>
                    </div>
                `;
            });
            html += '</div>';
        }
        html += '</div>';
        shopContainer.innerHTML = html;

        // Восстанавливаем состояние чекбоксов
        const checkedItems = loadState('shoppingChecked', []);
        checkedItems.forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                const cb = el.querySelector('input[type="checkbox"]');
                if (cb) {
                    cb.checked = true;
                    el.classList.add('checked');
                }
            }
        });
    }

    // --- ВОДА ---
    function renderWater() {
        const goal = Math.round(user.weight * 30); // мл
        document.getElementById('waterGoalDisplay').textContent = (goal / 1000).toFixed(1) + ' Л';
        document.getElementById('waterDrank').textContent = waterDrank + ' мл';
        const percent = Math.min(100, Math.round((waterDrank / goal) * 100));
        document.getElementById('waterPercent').textContent = percent + '%';
        document.getElementById('waterFill').style.width = percent + '%';

        // Стаканы
        const glassesContainer = document.getElementById('waterGlasses');
        const totalGlasses = Math.ceil(goal / WATER_PER_GLASS);
        let html = '';
        const filledCount = Math.floor(waterDrank / WATER_PER_GLASS);
        for (let i = 0; i < totalGlasses; i++) {
            const filled = i < filledCount ? 'filled' : '';
            html += `<div class="glass ${filled}" onclick="toggleGlass(${i})">${i+1}</div>`;
        }
        glassesContainer.innerHTML = html;
    }

    // --- ДНЕВНИК ПИТАНИЯ ---
    function renderFoodLog() {
        const container = document.getElementById('foodLog');
        if (foodLog.length === 0) {
            container.innerHTML = '<div style="color:#555;text-align:center;padding:20px;">Сегодня ничего не добавлено</div>';
        } else {
            let html = '';
            let totalCal = 0, totalProtein = 0, totalFat = 0, totalCarbs = 0;
            foodLog.forEach((item, idx) => {
                totalCal += item.cal;
                totalProtein += item.protein || 0;
                totalFat += item.fat || 0;
                totalCarbs += item.carbs || 0;
                html += `
                    <div class="log-item">
                        <span class="log-name">${item.name}</span>
                        <span class="log-cal">${item.cal} ккал</span>
                        <button class="log-del" onclick="removeFood(${idx})">✕</button>
                    </div>
                `;
            });
            container.innerHTML = html;
            document.getElementById('todayCal').textContent = totalCal;
            document.getElementById('todayProtein').textContent = totalProtein;
            document.getElementById('todayFat').textContent = totalFat;
            document.getElementById('todayCarbs').textContent = totalCarbs;
        }
        saveState('foodLog', foodLog);
    }

    // --- СТАТИСТИКА ---
    function renderStats() {
        // Обзор
        const overview = document.getElementById('statsOverview');
        const lastWeek = weightHistory.slice(-7);
        const avgWeight = lastWeek.length ? (lastWeek.reduce((s, e) => s + e.weight, 0) / lastWeek.length) : user.weight;
        const minWeight = lastWeek.length ? Math.min(...lastWeek.map(e => e.weight)) : user.weight;
        const maxWeight = lastWeek.length ? Math.max(...lastWeek.map(e => e.weight)) : user.weight;

        overview.innerHTML = `
            <div class="stats-card"><div class="stat-number">${user.weight}</div><div class="stat-label">Текущий вес</div></div>
            <div class="stats-card"><div class="stat-number">${avgWeight.toFixed(1)}</div><div class="stat-label">Средний за неделю</div></div>
            <div class="stats-card"><div class="stat-number">${minWeight}</div><div class="stat-label">Мин. вес</div></div>
            <div class="stats-card"><div class="stat-number">${maxWeight}</div><div class="stat-label">Макс. вес</div></div>
            <div class="stats-card"><div class="stat-number">${foodLog.length}</div><div class="stat-label">Записей сегодня</div></div>
        `;

        // История веса
        const historyContainer = document.getElementById('weightHistory');
        if (weightHistory.length === 0) {
            historyContainer.innerHTML = '<div style="color:#555;">Нет данных</div>';
        } else {
            let html = '';
            // Показываем последние 10 записей (сначала новые)
            const reversed = [...weightHistory].reverse().slice(0, 10);
            reversed.forEach(entry => {
                html += `
                    <div class="weight-entry">
                        <span class="date">${entry.date}</span>
                        <span class="weight">${entry.weight} кг</span>
                    </div>
                `;
            });
            historyContainer.innerHTML = html;
        }
    }

        grid.innerHTML = html || '<div style="color:#555;text-align:center;padding:20px;">Нет рецептов в этой категории</div>';
    }

    // --- ВЫПАДАЮЩИЙ СПИСОК ДЛЯ ДНЕВНИКА ---
    function renderFoodSelect() {
        const select = document.getElementById('foodSelect');
        select.innerHTML = '<option value="">-- Выберите рецепт --</option>';
        RECIPES.forEach(r => {
            const option = document.createElement('option');
            option.value = r.id;
            option.textContent = `${r.name} (${r.cal} ккал)`;
            select.appendChild(option);
        });
        // Добавляем вариант "Своё блюдо"
        const custom = document.createElement('option');
        custom.value = 'custom';
        custom.textContent = '✏️ Своё блюдо (введите вручную)';
        select.appendChild(custom);
    }

    // ================================================================
    // 5. ОБРАБОТЧИКИ СОБЫТИЙ
    // ================================================================

    // --- ВКЛАДКИ ---
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(btn.dataset.tab).classList.add('active');
        });
    });

    // --- ПОЛЗУНКИ ---
    ['age', 'height', 'weight'].forEach(param => {
        const range = document.getElementById(param + 'Range');
        const display = document.getElementById(param + 'Value');
        range.addEventListener('input', () => {
            const val = parseInt(range.value);
            display.textContent = val;
            user[param] = val;
            saveState(param, val);
        });
    });

    // --- ПОЛ ---
    document.getElementById('genderMale').addEventListener('click', function() {
        document.querySelectorAll('#tabCalc .btn-group .btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        user.gender = 'male';
        saveState('gender', 'male');
    });
    document.getElementById('genderFemale').addEventListener('click', function() {
        document.querySelectorAll('#tabCalc .btn-group .btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        user.gender = 'female';
        saveState('gender', 'female');
    });

    // --- АКТИВНОСТЬ ---
    document.querySelectorAll('#activityGroup .btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('#activityGroup .btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            user.activity = parseFloat(this.dataset.activity);
            saveState('activity', user.activity);
        });
    });

    // --- ДЕФИЦИТ ---
    document.querySelectorAll('#deficitGroup .btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('#deficitGroup .btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            user.deficit = parseFloat(this.dataset.deficit);
            saveState('deficit', user.deficit);
        });
    });

    // --- РАССЧИТАТЬ ---
    document.getElementById('calculateBtn').addEventListener('click', () => {
        // Обновляем данные из ползунков
        user.age = parseInt(document.getElementById('ageRange').value);
        user.height = parseInt(document.getElementById('heightRange').value);
        user.weight = parseInt(document.getElementById('weightRange').value);

        // Пересоздаём план недели
        weekPlan = generateWeekPlan();
        saveState('weekPlan', weekPlan);

        renderAll();
        // Переключаем на вкладку калькулятора
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelector('[data-tab="tabCalc"]').classList.add('active');
        document.getElementById('tabCalc').classList.add('active');
    });

    // --- ВОДА ---
    window.toggleGlass = function(index) {
        const goal = user.weight * 30;
        const maxGlasses = Math.ceil(goal / WATER_PER_GLASS);
        const filledCount = Math.floor(waterDrank / WATER_PER_GLASS);

        if (index < filledCount) {
            // Убираем стакан
            waterDrank = Math.max(0, waterDrank - WATER_PER_GLASS);
        } else if (index === filledCount) {
            // Добавляем стакан
            waterDrank = Math.min(goal, waterDrank + WATER_PER_GLASS);
        }
        saveState('waterDrank', waterDrank);
        renderWater();
    };

    document.getElementById('resetWaterBtn').addEventListener('click', () => {
        waterDrank = 0;
        saveState('waterDrank', 0);
        renderWater();
    });

    // --- ДНЕВНИК ---
    document.getElementById('addFoodBtn').addEventListener('click', () => {
        const select = document.getElementById('foodSelect');
        const val = select.value;
        if (!val) return;

        if (val === 'custom') {
            const name = prompt('Введите название блюда:');
            if (!name) return;
            const cal = parseInt(prompt('Введите калорийность (ккал):')) || 0;
            const protein = parseInt(prompt('Белки (г):')) || 0;
            const fat = parseInt(prompt('Жиры (г):')) || 0;
            const carbs = parseInt(prompt('Углеводы (г):')) || 0;
            foodLog.push({ name, cal, protein, fat, carbs });
        } else {
            const recipe = RECIPES.find(r => r.id == val);
            if (recipe) {
                foodLog.push({
                    name: recipe.name,
                    cal: recipe.cal,
                    protein: recipe.protein,
                    fat: recipe.fat,
                    carbs: recipe.carbs
                });
            }
        }
        saveState('foodLog', foodLog);
        renderFoodLog();
        select.value = '';
    });

    window.removeFood = function(index) {
        foodLog.splice(index, 1);
        saveState('foodLog', foodLog);
        renderFoodLog();
    };

    document.getElementById('resetFoodBtn').addEventListener('click', () => {
        if (confirm('Очистить дневник за сегодня?')) {
            foodLog = [];
            saveState('foodLog', foodLog);
            renderFoodLog();
        }
    });

    // --- ВЕС ---
    document.getElementById('addWeightBtn').addEventListener('click', () => {
        const input = document.getElementById('newWeightInput');
        const weight = parseFloat(input.value);
        if (!weight || weight < 30 || weight > 250) {
            alert('Введите корректный вес (30-250 кг)');
            return;
        }
        weightHistory.push({ date: new Date().toLocaleDateString(), weight });
        saveState('weightHistory', weightHistory);
        user.weight = weight;
        document.getElementById('weightRange').value = weight;
        document.getElementById('weightValue').textContent = weight;
        saveState('weight', weight);
        input.value = '';
        renderStats();
        renderCalculator();
    });

    // --- ФИЛЬТРЫ РЕЦЕПТОВ ---
    document.querySelectorAll('#recipeFilters .filter-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('#recipeFilters .filter-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            renderRecipes(this.dataset.filter);
        });
    });

    // --- СПИСОК ПОКУПОК (чекбоксы) ---
    window.toggleShopItem = function(id) {
        const el = document.getElementById(id);
        if (!el) return;
        const cb = el.querySelector('input[type="checkbox"]');
        el.classList.toggle('checked', cb.checked);
        // Сохраняем состояние
        const checkedItems = [];
        document.querySelectorAll('.shopping-item input[type="checkbox"]:checked').forEach(c => {
            const parent = c.closest('.shopping-item');
            if (parent) checkedItems.push(parent.id);
        });
        saveState('shoppingChecked', checkedItems);
    };

    // ================================================================
    // 6. ЗАГРУЗКА
    // ================================================================

    // Восстанавливаем активные кнопки
    function restoreUI() {
        // Пол
        if (user.gender === 'female') {
            document.getElementById('genderFemale').click();
        } else {
            document.getElementById('genderMale').click();
        }

        // Ползунки
        document.getElementById('ageRange').value = user.age;
        document.getElementById('heightRange').value = user.height;
        document.getElementById('weightRange').value = user.weight;
        document.getElementById('ageValue').textContent = user.age;
        document.getElementById('heightValue').textContent = user.height;
        document.getElementById('weightValue').textContent = user.weight;

        // Активность
        document.querySelectorAll('#activityGroup .btn').forEach(b => {
            if (parseFloat(b.dataset.activity) === user.activity) b.classList.add('active');
        });

        // Дефицит
        document.querySelectorAll('#deficitGroup .btn').forEach(b => {
            if (parseFloat(b.dataset.deficit) === user.deficit) b.classList.add('active');
        });
    }

    // --- ЗАПУСК ---
    restoreUI();
    renderAll();

    console.log('✅ FitCal загружен!');
    console.log('📌 Данные сохраняются в localStorage');
    console.log(`👤 ${user.gender === 'male' ? 'Мужчина' : 'Женщина'}, ${user.age} лет, ${user.weight} кг, ${user.height} см`);
    console.log(`💧 Воды выпито: ${waterDrank} мл из ${user.weight * 30} мл`);
    console.log(`📝 Записей в дневнике: ${foodLog.length}`);
    console.log(`📊 Записей веса: ${weightHistory.length}`);
</script>

</body>
</html>
