<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор калорий для похудения</title>
    <style>
        /* === ГЛОБАЛЬНЫЕ СТИЛИ === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        /* === ОСНОВНОЙ КОНТЕЙНЕР === */
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* === ЗАГОЛОВОК === */
        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #00d4ff, #7b2ffc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        /* === КАРТОЧКИ (GLASSMORPHISM) === */
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px 30px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: rgba(0, 212, 255, 0.3);
            transform: translateY(-2px);
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 18px;
            color: #00d4ff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* === СЕТКА ДЛЯ ВВОДА === */
        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 0.9rem;
            color: #aaa;
            font-weight: 500;
        }

        .input-group input[type="range"] {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            background: linear-gradient(90deg, #00d4ff, #7b2ffc);
            border-radius: 10px;
            outline: none;
            cursor: pointer;
        }

        .input-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #00d4ff;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }

        .input-group .value-display {
            font-size: 1.3rem;
            font-weight: 700;
            color: #fff;
        }

        /* === ВЫБОР АКТИВНОСТИ === */
        .activity-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 5px;
        }

        .activity-btn {
            padding: 8px 18px;
            border-radius: 30px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            background: transparent;
            color: #aaa;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .activity-btn:hover {
            border-color: #00d4ff;
            color: #fff;
        }

        .activity-btn.active {
            background: rgba(0, 212, 255, 0.2);
            border-color: #00d4ff;
            color: #fff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.15);
        }

        /* === КНОПКИ ДЕФИЦИТА === */
        .deficit-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .deficit-btn {
            padding: 12px 28px;
            border-radius: 30px;
            border: 2px solid rgba(255, 255, 255, 0.12);
            background: transparent;
            color: #aaa;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            flex: 1;
            min-width: 120px;
        }

        .deficit-btn:hover {
            border-color: #7b2ffc;
            color: #fff;
        }

        .deficit-btn.active {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(123, 47, 252, 0.2));
            border-color: #7b2ffc;
            color: #fff;
            box-shadow: 0 0 30px rgba(123, 47, 252, 0.15);
        }

        .deficit-btn .label {
            font-size: 0.75rem;
            color: #888;
            font-weight: 400;
            display: block;
            margin-top: 2px;
        }

        /* === КНОПКА РАССЧИТАТЬ === */
        .btn-calculate {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #00d4ff, #7b2ffc);
            color: #fff;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            margin-top: 10px;
        }

        .btn-calculate:hover {
            transform: scale(1.02);
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.25);
        }

        /* === РЕЗУЛЬТАТЫ === */
        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .result-item {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 14px;
            padding: 18px 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .result-item .number {
            font-size: 2rem;
            font-weight: 800;
            color: #00d4ff;
            display: block;
        }

        .result-item .desc {
            font-size: 0.85rem;
            color: #888;
            margin-top: 4px;
        }

        .result-item .sub-desc {
            font-size: 0.7rem;
            color: #555;
            margin-top: 2px;
        }

        /* === ТАБЛИЦА БЖУ === */
        .bju-row {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 15px;
            margin: 10px 0;
        }

        .bju-item {
            text-align: center;
            min-width: 70px;
        }

        .bju-item .bju-value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .bju-item .bju-label {
            font-size: 0.75rem;
            color: #888;
        }

        .bju-item.protein .bju-value { color: #ff6b6b; }
        .bju-item.fat .bju-value { color: #ffd93d; }
        .bju-item.carbs .bju-value { color: #6bcb77; }

        /* === КРУГОВАЯ ДИАГРАММА === */
        .chart-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin: 10px 0;
        }

        canvas#bjuChart {
            max-width: 200px;
            max-height: 200px;
        }

        .chart-legend {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
        }

        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 50%;
        }

        /* === ПЛАН НА НЕДЕЛЮ === */
        .week-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 18px;
            margin-top: 15px;
        }

        .day-card {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 14px;
            padding: 16px 18px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s ease;
        }

        .day-card:hover {
            border-color: rgba(0, 212, 255, 0.2);
        }

        .day-card .day-name {
            font-weight: 700;
            font-size: 1.1rem;
            color: #00d4ff;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 8px;
        }

        .day-card .meal {
            font-size: 0.85rem;
            padding: 4px 0;
            border-bottom: 1px dashed rgba(255,255,255,0.04);
        }

        .day-card .meal:last-child {
            border-bottom: none;
        }

        .day-card .meal .meal-type {
            color: #aaa;
            font-weight: 500;
        }

        .day-card .meal .meal-name {
            color: #fff;
        }

        .day-card .meal .meal-cal {
            color: #888;
            font-size: 0.75rem;
            float: right;
        }

        /* === РЕЦЕПТЫ === */
        .recipe-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
            margin-top: 15px;
        }

        .recipe-card {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 14px;
            padding: 15px 18px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s ease;
        }

        .recipe-card:hover {
            border-color: rgba(123, 47, 252, 0.3);
            transform: translateY(-3px);
        }

        .recipe-card .recipe-name {
            font-weight: 600;
            color: #fff;
            font-size: 1rem;
        }

        .recipe-card .recipe-info {
            font-size: 0.8rem;
            color: #888;
            margin: 6px 0;
        }

        .recipe-card .recipe-info span {
            color: #aaa;
        }

        .recipe-card .recipe-cal {
            color: #00d4ff;
            font-weight: 700;
        }

        .recipe-card .recipe-desc {
            font-size: 0.75rem;
            color: #666;
            margin-top: 4px;
            line-height: 1.4;
        }

        /* === СКРЫТИЕ === */
        .hidden {
            display: none !important;
        }

        /* === АНИМАЦИЯ ЗАГРУЗКИ === */
        .loader {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.05);
            border-top: 4px solid #00d4ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* === АДАПТИВ === */
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .card { padding: 18px 16px; }
            .input-grid { grid-template-columns: 1fr; }
            .deficit-btn { min-width: 80px; padding: 10px 16px; font-size: 0.85rem; }
            .result-grid { grid-template-columns: 1fr 1fr; }
            .week-grid { grid-template-columns: 1fr; }
        }

        /* === ПРОКРУТКА === */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a2e;
        }
        ::-webkit-scrollbar-thumb {
            background: #7b2ffc;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- ЗАГОЛОВОК -->

        </div>

        <div style="margin-top:18px;">

                <button class="activity-btn active" data-activity="1.375">Средний</button>

        </div>
    </div>

    <!-- КАРТОЧКА 2: ВЫБОР ДЕФИЦИТА -->
    <div class="card">
        <div class="card-title">🎯 Цель</div>
        <div class="deficit-buttons">

                🟢 Мягкий

            </button>
            <button class="deficit-btn active" data-deficit="0.85">
                🔵 Стандартный

            </button>
            <button class="deficit-btn" data-deficit="0.8">
                🔴 Быстрый
                <span class="label">-20% · интенсивно</span>
            </button>
        </div>
    </div>

    <!-- КНОПКА РАССЧИТАТЬ -->
    <button class="btn-calculate" id="calculateBtn">🔥 Рассчитать</button>

    <!-- ===== РЕЗУЛЬТАТЫ (скрыты по умолчанию) ===== -->
    <div id="resultsContainer" class="hidden">

        <!-- КАРТОЧКА 3: ОСНОВНЫЕ ЦИФРЫ -->
        <div class="card">
            <div class="card-title">📈 Ваша норма</div>
            <div class="result-grid" id="resultNumbers">
                <!-- Заполняется JS -->
            </div>
            <div style="margin-top:12px;">
                <div class="bju-row" id="bjuDisplay">
                    <!-- Заполняется JS -->
                </div>
            </div>
        </div>

        <!-- КАРТОЧКА 4: ГРАФИК БЖУ -->
        <div class="card">
            <div class="card-title">🥩 Распределение БЖУ</div>
            <div class="chart-container">
                <canvas id="bjuChart" width="200" height="200"></canvas>
                <div class="chart-legend" id="legendContainer">
                    <!-- Заполняется JS -->
                </div>
            </div>
        </div>

        <!-- КАРТОЧКА 5: ПЛАН НА НЕДЕЛЮ -->
        <div class="card">
            <div class="card-title">📅 План питания на неделю</div>
            <div class="week-grid" id="weekPlan">
                <!-- Заполняется JS -->
            </div>
        </div>

        <!-- КАРТОЧКА 6: БАЗА РЕЦЕПТОВ -->
        <div class="card">
            <div class="card-title">🍳 База рецептов (30 шт)</div>
            <div class="recipe-grid" id="recipeList">
                <!-- Заполняется JS -->
            </div>
        </div>

    </div>

</div>

        { id: 25, name: 'Смузи банановый', type: 'Перекус', cal: 180, protein: 4, fat: 2, carbs: 38, weight: '300мл', desc: 'Банан 120г, молоко 150мл, мёд 10г.' },
        { id: 26, name: 'Хлебцы с сыром', type: 'Перекус', cal: 150, protein: 10, fat: 8, carbs: 12, weight: '70г', desc: 'Хлебцы ржаные 30г, сыр 30г, огурец 40г.' },
        { id: 27, name: 'Варёное яйцо', type: 'Перекус', cal: 70, protein: 6, fat: 5, carbs: 0.5, weight: '50г', desc: '1 яйцо варёное.' },
        { id: 28, name: 'Овощные палочки с хумусом', type: 'Перекус', cal: 140, protein: 6, fat: 8, carbs: 14, weight: '120г', desc: 'Морковь 60г, огурец 60г, хумус 30г.' },
        { id: 29, name: 'Протеиновый батончик', type: 'Перекус', cal: 200, protein: 15, fat: 9, carbs: 18, weight: '60г', desc: 'Готовый батончик или смесь орехов+финики.' },
        { id: 30, name: 'Кефир с отрубями', type: 'Перекус', cal: 120, protein: 8, fat: 4, carbs: 14, weight: '250мл', desc: 'Кефир 1% 200мл, отруби 20г, мёд 5г.' }
    ];

    // ============================================================
    // 3. ФУНКЦИЯ РАСЧЁТА (Миффлин-Сан Жеор)
    // ============================================================
    function calculateCalories(gender, age, height, weight, activity, deficit) {
        let bmr;
        if (gender === 'male') {
            bmr = 10 * weight + 6.25 * height - 5 * age + 5;
        } else {
            bmr = 10 * weight + 6.25 * height - 5 * age - 161;
        }
        const tdee = bmr * activity;
        const calForWeightLoss = tdee * deficit;
        const protein = weight * 1.8;          // 1.8г на кг веса
        const fat = weight * 0.8;              // 0.8г на кг
        const carbs = (calForWeightLoss - (protein * 4 + fat * 9)) / 4;
        return {
            bmr: Math.round(bmr),
            tdee: Math.round(tdee),
            dailyCal: Math.round(calForWeightLoss),
            protein: Math.round(protein),
            fat: Math.round(fat),
            carbs: Math.round(carbs)
        };
    }

    // ============================================================
    // 4. ГЕНЕРАЦИЯ ПЛАНА НА НЕДЕЛЮ (из 30 рецептов)
    // ============================================================
    function generateWeekPlan() {
        // Разбиваем рецепты по типам
        const breakfasts = RECIPES.filter(r => r.type === 'Завтрак');
        const lunches = RECIPES.filter(r => r.type === 'Обед');
        const dinners = RECIPES.filter(r => r.type === 'Ужин');
        const snacks = RECIPES.filter(r => r.type === 'Перекус');

        // Берём по 7 дней, если не хватает — циклически добираем
        function pick(arr, index) {
            return arr[index % arr.length];
        }

        const days = ['Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота', 'Воскресенье'];
        const week = [];

        for (let i = 0; i < 7; i++) {
            // Сдвигаем индексы, чтобы не было повторений подряд
            const b = pick(breakfasts, i);
            const l = pick(lunches, i + 2);
            const d = pick(dinners, i + 4);
            const s1 = pick(snacks, i);
            const s2 = pick(snacks, i + 3);

            const totalCal = b.cal + l.cal + d.cal + s1.cal + s2.cal;

            week.push({
                day: days[i],
                meals: [
                    { type: 'Завтрак', name: b.name, cal: b.cal },
                    { type: 'Обед', name: l.name, cal: l.cal },
                    { type: 'Ужин', name: d.name, cal: d.cal },
                    { type: 'Перекус 1', name: s1.name, cal: s1.cal },
                    { type: 'Перекус 2', name: s2.name, cal: s2.cal }
                ],
                totalCal: totalCal
            });
        }
        return week;
    }

    // ============================================================
    // 5. ОТРИСОВКА UI
    // ============================================================

    // --- Элементы DOM ---
    const ageRange = document.getElementById('ageRange');
    const heightRange = document.getElementById('heightRange');
    const weightRange = document.getElementById('weightRange');
    const ageValue = document.getElementById('ageValue');
    const heightValue = document.getElementById('heightValue');
    const weightValue = document.getElementById('weightValue');
    const genderMale = document.getElementById('genderMale');
    const genderFemale = document.getElementById('genderFemale');
    const activityBtns = document.querySelectorAll('.activity-btn');
    const deficitBtns = document.querySelectorAll('.deficit-btn');
    const calculateBtn = document.getElementById('calculateBtn');
    const resultsContainer = document.getElementById('resultsContainer');
    const resultNumbers = document.getElementById('resultNumbers');
    const bjuDisplay = document.getElementById('bjuDisplay');
    const weekPlan = document.getElementById('weekPlan');
    const recipeList = document.getElementById('recipeList');
    const chartCanvas = document.getElementById('bjuChart');

    // --- Обновление значений ползунков ---
    ageRange.addEventListener('input', () => {
        ageValue.textContent = ageRange.value;
        state.age = parseInt(ageRange.value);
    });
    heightRange.addEventListener('input', () => {
        heightValue.textContent = heightRange.value;
        state.height = parseInt(heightRange.value);
    });
    weightRange.addEventListener('input', () => {
        weightValue.textContent = weightRange.value;
        state.weight = parseInt(weightRange.value);
    });

    // --- Пол ---
    genderMale.addEventListener('click', () => {
        genderMale.classList.add('active');
        genderFemale.classList.remove('active');
        state.gender = 'male';
    });
    genderFemale.addEventListener('click', () => {
        genderFemale.classList.add('active');
        genderMale.classList.remove('active');
        state.gender = 'female';
    });

    // --- Активность ---
    activityBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            activityBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            state.activity = parseFloat(btn.dataset.activity);
        });
    });

    // --- Дефицит ---
    deficitBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            deficitBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            state.deficit = parseFloat(btn.dataset.deficit);
        });
    });

    // --- ГЛАВНАЯ КНОПКА ---
    calculateBtn.addEventListener('click', () => {
        // 1. Рассчитать
        const result = calculateCalories(
            state.gender,
            state.age,
            state.height,
            state.weight,
            state.activity,
            state.deficit
        );
        state.result = result;

        // 2. Сгенерировать план
        const week = generateWeekPlan();

        // 3. Показать результаты
        renderResults(result, week);

        // 4. Показать контейнер
        resultsContainer.classList.remove('hidden');

        // 5. Прокрутка к результатам
        resultsContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    // ============================================================
    // 6. ФУНКЦИИ ОТРИСОВКИ
    // ============================================================

    function renderResults(result, week) {
        // --- Основные цифры ---
        resultNumbers.innerHTML = `
            <div class="result-item">
                <span class="number">${result.dailyCal}</span>
                <div class="desc">Калорий в день</div>
                <div class="sub-desc">для похудения</div>
            </div>
            <div class="result-item">
                <span class="number">${result.tdee}</span>
                <div class="desc">Поддержание</div>
                <div class="sub-desc">без дефицита</div>
            </div>
            <div class="result-item">
                <span class="number">${result.bmr}</span>
                <div class="desc">Базовый обмен</div>
                <div class="sub-desc">в покое</div>
            </div>
            <div class="result-item">
                <span class="number">${Math.round(result.dailyCal / 5)}</span>
                <div class="desc">На 1 приём</div>
                <div class="sub-desc">≈ 5 раз в день</div>
            </div>
        `;

        // --- БЖУ ---
        bjuDisplay.innerHTML = `
            <div class="bju-item protein">
                <div class="bju-value">${result.protein}г</div>
                <div class="bju-label">🥩 Белки</div>
            </div>
            <div class="bju-item fat">
                <div class="bju-value">${result.fat}г</div>
                <div class="bju-label">🥑 Жиры</div>
            </div>
            <div class="bju-item carbs">
                <div class="bju-value">${result.carbs}г</div>
                <div class="bju-label">🍞 Углеводы</div>
            </div>
        `;

        // --- График БЖУ (круговая диаграмма) ---
        drawChart(result.protein, result.fat, result.carbs);

        // --- План на неделю ---
        renderWeek(week);

        // --- Список рецептов ---
        renderRecipes();
    }

    // --- ОТРИСОВКА НЕДЕЛИ ---
    function renderWeek(week) {
        weekPlan.innerHTML = '';
        week.forEach(day => {
            const card = document.createElement('div');
            card.className = 'day-card';
            let mealsHtml = '';
            day.meals.forEach(m => {
                mealsHtml += `
                    <div class="meal">
                        <span class="meal-type">${m.type}:</span>
                        <span class="meal-name">${m.name}</span>
                        <span class="meal-cal">${m.cal} ккал</span>
                    </div>
                `;
            });
            card.innerHTML = `
                <div class="day-name">📆 ${day.day}</div>
                ${mealsHtml}
                <div style="margin-top:8px;color:#00d4ff;font-weight:700;text-align:right;">
                    Итого: ${day.totalCal} ккал
                </div>
            `;
            weekPlan.appendChild(card);
        });
    }

    // --- ОТРИСОВКА РЕЦЕПТОВ ---
    function renderRecipes() {
        recipeList.innerHTML = '';
        RECIPES.forEach(r => {
            const card = document.createElement('div');
            card.className = 'recipe-card';
            card.innerHTML = `
                <div class="recipe-name">${r.name}</div>
                <div class="recipe-info">
                    <span>${r.type}</span> · ${r.weight}
                </div>
                <div class="recipe-cal">🔥 ${r.cal} ккал</div>
                <div class="recipe-info">
                    Б:${r.protein}г · Ж:${r.fat}г · У:${r.carbs}г
                </div>
                <div class="recipe-desc">${r.desc}</div>
            `;
            recipeList.appendChild(card);
        });
    }

    // --- КРУГОВАЯ ДИАГРАММА ---
    function drawChart(protein, fat, carbs) {
        const ctx = chartCanvas.getContext('2d');
        const total = protein + fat + carbs;
        if (total === 0) return;

        const data = [
            { label: 'Белки', value: protein, color: '#ff6b6b' },
            { label: 'Жиры', value: fat, color: '#ffd93d' },
            { label: 'Углеводы', value: carbs, color: '#6bcb77' }
        ];

        ctx.clearRect(0, 0, 200, 200);

        let startAngle = -Math.PI / 2;
        const centerX = 100, centerY = 100, radius = 80;

        data.forEach(item => {
            const sliceAngle = (item.value / total) * 2 * Math.PI;
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius, startAngle, startAngle + sliceAngle);
            ctx.closePath();
            ctx.fillStyle = item.color;
            ctx.fill();
            ctx.strokeStyle = '#0f0f1a';
            ctx.lineWidth = 2;
            ctx.stroke();
            startAngle += sliceAngle;
        });

        // Легенда
        const legendContainer = document.getElementById('legendContainer');
        legendContainer.innerHTML = data.map(item => `
            <div class="legend-item">
                <div class="legend-color" style="background:${item.color};"></div>
                ${item.label}: ${Math.round(item.value / total * 100)}%
            </div>
        `).join('');
    }

    // ============================================================
    // 7. АВТОЗАПУСК ПРИ ЗАГРУЗКЕ (с демо-данными)
    // ============================================================
    // При загрузке страницы сразу показываем результат
    window.addEventListener('DOMContentLoaded', () => {
        // Устанавливаем стартовые значения
        ageRange.value = 31;
        heightRange.value = 180;
        weightRange.value = 87;
        ageValue.textContent = '31';
        heightValue.textContent = '180';
        weightValue.textContent = '87';

        // Имитируем клик по кнопке "Рассчитать"
        setTimeout(() => {
            calculateBtn.click();
        }, 300);
    });

    // ============================================================
    // 8. СОХРАНЕНИЕ В LOCALSTORAGE (опционально)
    // ============================================================
    // Сохраняем последний результат при расчёте
    const originalClick = calculateBtn.click;
    calculateBtn.addEventListener('click', () => {
        if (state.result) {
            try {
                localStorage.setItem('fitcal_last_result', JSON.stringify(state.result));
                localStorage.setItem('fitcal_last_week', JSON.stringify(generateWeekPlan()));
            } catch(e) {}
        }
    });

    console.log('✅ FitCal загружен! 30 рецептов, план на неделю, график БЖУ.');
    console.log('📌 Ваши данные: возраст 31, вес 87, рост 180, активность средняя.');
</script>
